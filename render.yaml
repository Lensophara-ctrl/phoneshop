services:
  - type: web
    name: phoneshop
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: phoneshop-db
          property: connectionString
      - key: LOG_CHANNEL
        value: stderr

databases:
  - name: phoneshop-db
    databaseName: phoneshop
    plan: free
